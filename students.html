<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Students | 9E Digital Hub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>
<body>

<div class="container mt-3 mb-4">
    <a href="index.html" class="back-home-btn">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>
</div>

<div class="container py-5">

<h1 class="text-center fw-bold mb-5">

👨‍🎓 Our Students

</h1>

<div class="row justify-content-center mb-5">

<div class="col-lg-5">

<div class="input-group input-group-lg">

<span class="input-group-text">

<i class="fa-solid fa-magnifying-glass"></i>

</span>

<input
    type="text"
    id="searchInput"
    class="form-control form-control-lg"
    placeholder="Search by Name, Roll No or GR No...">

<div class="filter-container">

<button class="filter-btn active" onclick="filterStudents('all', this)">

<i class="fa-solid fa-user-graduate"></i>

<span>All</span>

<small id="allCount">72</small>

</button>

<button class="filter-btn" onclick="filterStudents('Male', this)">

<i class="fa-solid fa-child"></i>

<span>Boys</span>

<small id="boyCount">35</small>

</button>

<button class="filter-btn" onclick="filterStudents('Female', this)">

<i class="fa-solid fa-child-dress"></i>

<span>Girls</span>

<small id="girlCount">37</small>

</button>

</div>

<h5 class="text-center mb-4">

Showing <span id="studentCount">72</span> Students

</h5>
</div>

</div>

</div>

<div class="row g-4" id="studentContainer">

</div>

</div>

<script src="script.js"></script>

</body>

</html>
